  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c09b72d6-3999-477b-972f-d83f9e03be79\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e863d20c-f8cc-431e-af08-7642ee926dc5\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"23d1d192-73dc-4ed8-abf8-1823e9d006a1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9e0f9824-c892-4696-b652-321dfb4d8eb2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Editor's Note — brand-supplied script face. Used as an editorial accent\n   (signatures, captain's notes, hand-written marginalia, \"From the Editor\"\n   callouts). NOT for body or large display — it is a decorative voice\n   only, paired against the serif/sans system. */\n@font-face {\n  font-family: 'Editors Note';\n  src: url(\"ea49e60b-25ef-44ee-848a-624e9c36fe28\") format('truetype');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Editors Note';\n  src: url(\"3733a641-fb51-422f-9229-b8699cdd6f8c\") format('truetype');\n  font-weight: 400;\n  font-style: italic;\n  font-display: swap;\n}\n\n:root {\n  /* ---------- Brand colors ---------- */\n  --ws-blue:        #1F4D6B;   /* WSC Blue — primary navy from logo */\n  --ws-blue-deep:   #143348;   /* Deeper navy for hover/press        */\n  --ws-blue-ink:    #0E2436;   /* Near-black navy for text emphasis  */\n  --ws-seafoam:     #9CC2D2;   /* Seafoam — flourish + star         */\n  --ws-seafoam-soft:#C5DAE3;   /* Lighter seafoam — washes, fills    */\n  --ws-seafoam-deep:#6FA3B8;   /* Deeper seafoam — accents           */\n  --ws-sand:        #E8DCC4;   /* Warm sand — background warmth      */\n  --ws-sand-soft:   #F4ECDC;   /* Soft sand — page tint              */\n  --ws-coral:       #D97A5B;   /* Sunset coral — CTA accent          */\n  --ws-gold:        #C9A96A;   /* Brass/gold — premium accent        */\n\n  /* ---------- Neutrals ---------- */\n  --ws-white:       #FFFFFF;\n  --ws-paper:       #FBF9F4;   /* Off-white, paper-warm              */\n  --ws-stone-50:    #F6F4EE;\n  --ws-stone-100:   #ECE8DD;\n  --ws-stone-200:   #D9D2C2;\n  --ws-stone-300:   #B8AE9A;\n  --ws-stone-400:   #8C8472;\n  --ws-stone-500:   #5F5A4D;\n  --ws-stone-600:   #3F3C34;\n  --ws-ink:         #1B1B17;\n\n  /* ---------- Semantic ---------- */\n  --ws-success:     #4A7C59;\n  --ws-warning:     #C9892F;\n  --ws-error:       #B23A2F;\n  --ws-info:        var(--ws-seafoam-deep);\n\n  /* ---------- Foreground / Background tokens ---------- */\n  --bg-page:        var(--ws-paper);\n  --bg-surface:     var(--ws-white);\n  --bg-surface-2:   var(--ws-stone-50);\n  --bg-inverse:     var(--ws-blue);\n  --bg-inverse-2:   var(--ws-blue-deep);\n\n  --fg-1:           var(--ws-blue-ink);     /* primary text */\n  --fg-2:           var(--ws-stone-600);    /* secondary    */\n  --fg-3:           var(--ws-stone-500);    /* muted        */\n  --fg-4:           var(--ws-stone-400);    /* placeholder  */\n  --fg-on-inverse:  var(--ws-white);\n  --fg-on-inverse-2:var(--ws-seafoam-soft);\n  --fg-link:        var(--ws-blue);\n  --fg-link-hover:  var(--ws-coral);\n\n  --border-1:       rgba(20, 51, 72, 0.12);\n  --border-2:       rgba(20, 51, 72, 0.20);\n  --border-strong:  var(--ws-blue);\n  --hairline:       rgba(20, 51, 72, 0.08);\n\n  /* ---------- Type families ---------- */\n  --font-serif:     'Cormorant Garamond', 'Trajan Pro', 'Garamond', 'Times New Roman', serif;\n  --font-serif-sc:  'Cormorant SC', 'Trajan Pro', 'Cormorant Garamond', serif;\n  --font-sans:      'Montserrat', 'Whitney', 'Proxima Nova', -apple-system, 'Segoe UI', sans-serif;\n  --font-mono:      ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n  --font-script:    'Editors Note', 'Caveat', 'Bradley Hand', cursive;  /* editorial accent only */\n\n  /* ---------- Type scale ---------- */\n  --fs-xs:   12px;\n  --fs-sm:   14px;\n  --fs-base: 16px;\n  --fs-md:   18px;\n  --fs-lg:   22px;\n  --fs-xl:   28px;\n  --fs-2xl:  36px;\n  --fs-3xl:  48px;\n  --fs-4xl:  64px;\n  --fs-5xl:  84px;\n  --fs-6xl:  112px;\n\n  /* ---------- Tracking / Leading ---------- */\n  --lh-tight:   1.05;\n  --lh-snug:    1.18;\n  --lh-normal:  1.45;\n  --lh-loose:   1.7;\n\n  --ls-display: -0.01em;\n  --ls-body:    0;\n  --ls-eyebrow: 0.22em;     /* widely tracked all-caps eyebrows */\n  --ls-button:  0.14em;\n\n  /* ---------- Radii ---------- */\n  --r-xs: 2px;\n  --r-sm: 4px;\n  --r-md: 6px;\n  --r-lg: 10px;\n  --r-xl: 16px;\n  --r-pill: 999px;\n\n  /* ---------- Shadows ---------- */\n  --shadow-1: 0 1px 2px rgba(20, 51, 72, 0.06), 0 1px 1px rgba(20, 51, 72, 0.04);\n  --shadow-2: 0 4px 12px rgba(20, 51, 72, 0.08), 0 1px 2px rgba(20, 51, 72, 0.04);\n  --shadow-3: 0 12px 32px rgba(20, 51, 72, 0.12), 0 2px 6px rgba(20, 51, 72, 0.06);\n  --shadow-card: 0 18px 48px -12px rgba(14, 36, 54, 0.22);\n\n  /* ---------- Spacing scale (4px base) ---------- */\n  --sp-1: 4px;\n  --sp-2: 8px;\n  --sp-3: 12px;\n  --sp-4: 16px;\n  --sp-5: 24px;\n  --sp-6: 32px;\n  --sp-7: 48px;\n  --sp-8: 64px;\n  --sp-9: 96px;\n  --sp-10: 128px;\n\n  /* ---------- Motion ---------- */\n  --ease-sail:  cubic-bezier(0.22, 0.61, 0.36, 1);  /* slow ease-out, like a yacht gliding */\n  --ease-tide:  cubic-bezier(0.4, 0, 0.2, 1);\n  --dur-1: 160ms;\n  --dur-2: 280ms;\n  --dur-3: 480ms;\n  --dur-4: 800ms;\n}\n\n/* ============================================================\n   Semantic typographic styles\n   ============================================================ */\n\n.ws-display {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-size: var(--fs-5xl);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-display);\n  color: var(--fg-1);\n}\n\n.ws-h1 {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-size: var(--fs-3xl);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n}\n\n.ws-h2 {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-size: var(--fs-2xl);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n}\n\n.ws-h3 {\n  font-family: var(--font-serif);\n  font-weight: 500;\n  font-size: var(--fs-xl);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n}\n\n.ws-h4 {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--fs-md);\n  line-height: var(--lh-snug);\n  letter-spacing: 0.01em;\n  color: var(--fg-1);\n}\n\n.ws-eyebrow {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--fs-xs);\n  line-height: 1;\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--ws-seafoam-deep);\n}\n\n.ws-eyebrow--gold { color: var(--ws-gold); }\n.ws-eyebrow--ink  { color: var(--ws-blue); }\n\n.ws-p {\n  font-family: var(--font-sans);\n  font-weight: 400;\n  font-size: var(--fs-base);\n  line-height: var(--lh-normal);\n  color: var(--fg-2);\n  text-wrap: pretty;\n}\n\n.ws-p--lead {\n  font-family: var(--font-serif);\n  font-weight: 300;\n  font-style: italic;\n  font-size: var(--fs-lg);\n  line-height: var(--lh-normal);\n  color: var(--fg-1);\n}\n\n.ws-small {\n  font-family: var(--font-sans);\n  font-size: var(--fs-sm);\n  line-height: var(--lh-normal);\n  color: var(--fg-3);\n}\n\n.ws-caption {\n  font-family: var(--font-sans);\n  font-weight: 500;\n  font-size: var(--fs-xs);\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n\n.ws-button {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--fs-sm);\n  letter-spacing: var(--ls-button);\n  text-transform: uppercase;\n}\n\n/* Editorial script accent — signatures, captain's notes, marginalia.\n   Use sparingly, never for body or for sizes under ~22px (legibility). */\n.ws-script {\n  font-family: var(--font-script);\n  font-weight: 400;\n  font-size: var(--fs-2xl);\n  line-height: 1.1;\n  color: var(--ws-blue);\n}\n.ws-script--italic { font-style: italic; }\n\n/* Wordmark-style mini lockup (used in headers) */\n.ws-wordmark {\n  font-family: var(--font-serif);\n  font-weight: 500;\n  font-size: var(--fs-lg);\n  letter-spacing: 0.02em;\n  color: var(--ws-blue);\n}\n.ws-wordmark .cap { font-size: 1.18em; }\n.ws-wordmark .sub {\n  display: block;\n  font-family: var(--font-serif-sc);\n  font-size: 0.42em;\n  letter-spacing: 0.42em;\n  margin-top: 2px;\n  color: var(--ws-blue);\n}\n<\u002Fstyle>\n<!-- ext-resource-dependency: d3 -->\n<script src=\"ca876946-64a9-45b9-a3d2-c794a1562710\"><\u002Fscript>\n<!-- ext-resource-dependency: topojson-client -->\n<script src=\"b466d1a7-91ed-4b62-af5d-160339b41d46\"><\u002Fscript>\n\n\n<style>\n  :root { --globe: 380px; }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; }\n  body {\n    background: #ffffff;\n    color: var(--ws-blue-ink);\n    font-family: var(--font-sans, \"Montserrat\", system-ui, sans-serif);\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .fleet {\n    max-width: 1180px;\n    margin: 0 auto;\n    padding: clamp(40px, 6vw, 88px) clamp(20px, 5vw, 64px) clamp(32px, 4vw, 56px);\n  }\n\n  /* ---------- Header ---------- */\n  .fleet-head { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; }\n  .fleet-head img.logo { height: 34px; width: auto; margin-bottom: 6px; opacity: 0.96; }\n  .eyebrow {\n    font-size: 12px;\n    letter-spacing: 0.26em;\n    text-transform: uppercase;\n    font-weight: 600;\n    color: var(--ws-seafoam-deep);\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .eyebrow::before, .eyebrow::after {\n    content: \"\";\n    width: 26px; height: 1px;\n    background: var(--ws-gold);\n    opacity: 0.8;\n  }\n  .fleet-head h1 {\n    font-family: var(--font-serif, \"Cormorant Garamond\", Georgia, serif);\n    font-weight: 500;\n    font-size: clamp(34px, 5vw, 54px);\n    line-height: 1.05;\n    margin: 2px 0 0;\n    color: var(--ws-blue-ink);\n    letter-spacing: 0.005em;\n  }\n  .fleet-head p.lede {\n    max-width: 620px;\n    margin: 4px auto 0;\n    font-size: clamp(15px, 1.4vw, 17px);\n    line-height: 1.6;\n    color: var(--ws-stone-600);\n  }\n  .fleet-head p.lede em {\n    font-family: var(--font-serif, \"Cormorant Garamond\", Georgia, serif);\n    font-style: italic;\n    font-size: 1.12em;\n    color: var(--ws-blue);\n  }\n\n  /* ---------- Daily Dispatch ---------- */\n  .dispatch {\n    margin: clamp(24px, 3.5vw, 44px) auto 0;\n    max-width: 720px;\n    border-top: 1px solid var(--ws-gold);\n    border-bottom: 1px solid var(--ws-gold);\n    padding: 22px 0 20px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    text-align: center;\n    gap: 10px;\n  }\n  .dispatch-label {\n    font-family: var(--font-script, 'Editors Note', cursive);\n    font-size: 22px;\n    color: var(--ws-seafoam-deep);\n    line-height: 1;\n    letter-spacing: 0;\n  }\n  .dispatch-fact {\n    font-family: var(--font-serif, 'Cormorant Garamond', Georgia, serif);\n    font-size: clamp(17px, 2vw, 21px);\n    font-style: italic;\n    font-weight: 300;\n    line-height: 1.55;\n    color: var(--ws-blue-ink);\n    max-width: 640px;\n    text-wrap: pretty;\n  }\n  .dispatch-attr {\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    font-weight: 600;\n    color: var(--ws-stone-400);\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n  }\n  .dispatch-attr::before, .dispatch-attr::after {\n    content: \"\";\n    width: 18px; height: 1px;\n    background: var(--ws-stone-300);\n  }\n\n  /* ---------- Panel ---------- */\n  .panel {\n    margin-top: clamp(28px, 4vw, 52px);\n    display: grid;\n    grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);\n    gap: clamp(24px, 4vw, 64px);\n    align-items: center;\n  }\n\n  /* globe column */\n  .globe-col { display: flex; justify-content: center; }\n  .stage {\n    position: relative;\n    width: min(86vw, 560px);\n    aspect-ratio: 1 / 1;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .loader {\n    position: relative;\n    width: var(--globe);\n    height: var(--globe);\n    max-width: 100%;\n    cursor: grab;\n    touch-action: none;\n  }\n  .loader.dragging { cursor: grabbing; }\n  canvas#globe { position: absolute; inset: 0; width: 100%; height: 100%; }\n\n  .whirl { position: absolute; inset: -68px; pointer-events: none; overflow: visible; }\n  .whirl svg { width: 100%; height: 100%; overflow: visible; display: block; }\n  .whirl .ring { fill: none; stroke: var(--ws-blue); transform-origin: 50% 50%; }\n  @keyframes spinCW  { to { transform: rotate(360deg); } }\n  @keyframes spinCCW { to { transform: rotate(-360deg); } }\n  .ring.r1 { animation: spinCW 9s linear infinite; }\n  .ring.r2 { animation: spinCCW 14s linear infinite; }\n  .ring.r3 { animation: spinCW 22s linear infinite; }\n  @media (prefers-reduced-motion: reduce) { .ring { animation: none; } }\n\n  .labels { position: absolute; inset: 0; pointer-events: none; }\n  .ship {\n    position: absolute; top: 0; left: 0;\n    will-change: transform, opacity; white-space: no  .zoom button svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }\n\n  /* ---------- Roster ---------- */\n  .roster-head {\n    display: flex; align-items: baseline; justify-content: space-between;\n    border-bottom: 1px solid var(--border-1, rgba(20,51,72,0.12));\n    padding-bottom: 12px; margin-bottom: 4px;\n  }\n  .roster-head .ttl { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600; color: var(--ws-blue); }\n  .roster-head .cnt { font-size: 12px; letter-spacing: 0.04em; color: var(--ws-stone-400); }\n\n  .roster { list-style: none; margin: 0; padding: 0; }\n  .roster li {\n    display: grid; grid-template-columns: 18px 1fr auto; align-items: center; gap: 14px;\n    padding: 15px 10px 15px 6px;\n    border-bottom: 1px solid var(--border-1, rgba(20,51,72,0.10));\n    cursor: pointer;\n    transition: background 200ms var(--ease-sail, ease);\n  }\n  .roster li:hover { background: rgba(156,194,210,0.10); }\n  .roster li.active { background: rgba(156,194,210,0.18); }\n  .roster li .pin { width: 17px; height: 17px; justify-self: center; display: block; }\n  .roster li .pin path { fill: #8CC1A0; transition: fill 200ms var(--ease-sail, ease); }\n  .roster li:hover .pin path, .roster li.active .pin path { fill: #6FA985; }\n  .roster li .meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }\n  .roster li .meta .nm {\n    font-family: var(--font-serif, \"Cormorant Garamond\", Georgia, serif);\n    font-size: 22px; font-weight: 600; line-height: 1.1; color: var(--ws-blue-ink);\n  }\n  .roster li .meta .loc { font-size: 13px; color: var(--ws-stone-500); line-height: 1.3; }\n  .roster li .region { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; color: var(--ws-seafoam-deep); text-align: right; white-space: nowrap; }\n  .roster li .meta .arrow { display: none; }\n\n  /* ---------- Footer note -------- x-sizing: border-box; border: 1px solid rgba(20,51,72,0.2); border-radius: 2px; padding: 9px 10px; font-size: 13px; font-family: monospace; margin-bottom: 4px; }\n  .wx-box input:focus { outline: 2px solid var(--ws-seafoam-deep,#6A9FB0); outline-offset: 1px; border: none; }\n  .wx-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }\n  .wx-save { background: var(--ws-blue,#1F4D6B); color: #fff; border: none; border-radius: 2px; padding: 9px 18px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: background 160ms; }\n  .wx-save:hover { background: #11324A; }\n  .wx-cancel { background: none; border: 1px solid rgba(20,51,72,0.2); border-radius: 2px; padding: 9px 14px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; cursor: pointer; color: var(--ws-stone-400,#8A9CAA); }\n\n  @media (max-width: 860px) {\n    .panel { grid-template-columns: 1fr; gap: 28px; }\n    .roster li .meta .nm { font-size: 20px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <section class=\"fleet\" data-screen-label=\"Fleet Tracker\">\n    <div class=\"fleet-head\">\n      <img class=\"logo\" src=\"06c876bb-5170-4d72-95e6-c6c8dc60133f\" alt=\"Windstar Cruises\">\n      <span class=\"eyebrow\">Live Fleet Positions<\u002Fspan>\n      <h1>Following the Fleet<\u002Fh1>\n      <p class=\"lede\">Seven small ships, 330+ ports, one world worth getting close to. Spin the globe or choose a yacht to see where each is sailing right now — <em>180° from Ordinary.<\u002Fem><\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"dispatch\" id=\"dispatch\">\n      <span class=\"dispatch-label\">From the Captain's Log<\u002Fspan>\n      <p class=\"dispatch-fact\" id=\"dispatchFact\"><\u002Fp>\n      <span class=\"dispatch-attr\" id=\"dispatchAttr\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"panel\">\n      <div class=\"globe-col\">\n        <div class=\"stage\">\n          <div class=\"loader\">\n            <div class=\"whirl\">\n              <svg viewBox=\"0 0 284 284\" aria-hidden=\"true\">\n                <ellipse class=\"ring r1\" cx=\"142\" cy=\"142\" rx=\"138\" ry=\"58\" stroke-width=\"1.1\" stroke-dasharray=\"2 250\" stroke-linecap=\"round\" opacity=\"0.85\" transform=\"rotate(18 142 142)\"><\u002Fellipse>\n                <ellipse class=\"ring r2\" cx=\"142\" cy=\"142\" rx=\"132\" ry=\"50\" stroke-width=\"1\" stroke-dasharray=\"60 420\" stroke-linecap=\"round\" opacity=\"0.42\" transform=\"rotate(-26 142 142)\"><\u002Fellipse>\n                <ellipse class=\"ring r3\" cx=\"142\" cy=\"142\" rx=\"120\" ry=\"120\" stroke-width=\"0.9\" stroke-dasharray=\"1 8\" opacity=\"0.16\"><\u002Fellipse>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <canvas id=\"globe\" width=\"380\" height=\"380\"><\u002Fcanvas>\n            <div class=\"labels\" id=\"labels\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"live\"><span class=\"dot\"><\u002Fspan>Tracking live<button class=\"wx-cfg\" id=\"wxCfg\" title=\"Configure live weather\"><svg viewBox=\"0 0 18 14\" width=\"16\" height=\"12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><path d=\"M5 12c-2.2 0-4-1.8-4-4 0-1.9 1.3-3.5 3.1-3.9C4.8 2.2 6.8 1 9 1c2 0 3.7 1.1 4.6 2.8C15 3.6 17 5.2 17 7.5c0 2.5-2 4.5-4.5 4.5H5z\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n          <div class=\"zoom\">\n            <button id=\"zin\" aria-label=\"Zoom in\" title=\"Zoom in\"><svg viewBox=\"0 0 24 24\"><line x1=\"12\" y1=\"6\" x2=\"12\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"12\" x2=\"18\" y2=\"12\"><\u002Fline><\u002Fsvg><\u002Fbutton>\n            <button id=\"zout\" aria-label=\"Zoom out\" title=\"Zoom out\"><svg viewBox=\"0 0 24 24\"><line x1=\"6\" y1=\"12\" x2=\"18\" y2=\"12\"><\u002Fline><\u002Fsvg><\u002Fbutton>\n            <button id=\"zreset\" aria-label=\"Resume rotation\" title=\"Resume rotation\"><svg viewBox=\"0 0 24 24\"><path d=\"M4 12a8 8 0 1 1 2.3 5.6\"><\u002Fpath><polyline points=\"4 19 4 13 10 13\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"roster-col\">\n        <div class=\"roster-head\">\n          <span class=\"ttl\">The Fleet<\u002Fspan>\n          <span class=\"cnt\">7 yachts at sea<\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"roster\" id=\"roster\"><\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"wx-overlay\" id=\"wxOverlay\">\n      <div class=\"wx-box\">\n        <h3>Live Weather at Sea<\u002Fh3>\n        <p>Display real-time conditions at each ship's position. Free API at <a href=\"https://openweathermap.org/api\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--ws-seafoam-deep,#6A9FB0)\">openweathermap.org<\u002Fa> — sign up and copy your Current Weather API key.<\u002Fp>\n        <label for=\"wxKeyInput\">OpenWeatherMap API Key<\u002Flabel>\n        <input id=\"wxKeyInput\" type=\"text\" placeholder=\"Paste your API key here\" autocomplete=\"off\" spellcheck=\"false\">\n        <div class=\"wx-actions\">\n          <button class=\"wx-cancel\" id=\"wxCancel\">Cancel<\u002Fbutton>\n          <button class=\"wx-save\" id=\"wxSave\">Save &amp; Fetch<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fleet-foot\">\n      <span>Approximate positions from AIS vessel tracking. Itineraries subject to change.<\u002Fspan>\n      <span class=\"mark\">Windstar Cruises<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<script>\n(function () {\n  const SIZE = 380;\n  const canvas = document.getElementById(\"globe\");\n  const labelsEl = document.getElementById(\"labels\");\n  const rosterEl = document.getElementById(\"roster\");\n  const loaderEl = canvas.parentElement;\n  const ctx = canvas.getContext(\"2d\");\n\n  const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));\n  canvas.width = SIZE * dpr;\n  canvas.height = SIZE * dpr;\n  ctx.scale(dpr, dpr);\n\n  const cx = SIZE / 2, cy = SIZE / 2, R = SIZE * 0.40;\n\n  // Windstar fleet — positions from public AIS (CruiseMapper/VesselFinder), Jun 19 2026\n  const SHIPS = [\n    { name: \"Wind Surf\",   type: \"sail\",  mmsi: \"309242000\", region: \"W. Mediterranean\", loc: \"En route to Tarragona, Spain\",              coord: [1.25, 41.10] },\n    { name: \"Wind Star\",   type: \"sail\",  mmsi: \"309163000\", region: \"Aegean Sea\",        loc: \"En route to Piraeus-Athens, Greece\",        coord: [23.50, 37.30] },\n    { name: \"Star Legend\", type: \"motor\", mmsi: \"311085000\", region: \"North Sea\",         loc: \"Approaching Edinburgh (Leith), Scotland\",   coord: [-3.18, 56.00] },\n    { name: \"Star Pride\",  type: \"motor\", mmsi: \"311084000\", region: \"NE Atlantic\",       loc: \"En route to Gourock, Scotland\",             coord: [-6.50, 54.20] },\n    { name: \"Wind Spirit\", type: \"sail\",  mmsi: \"309056000\", region: \"Aegean Sea\",        loc: \"En route Piraeus → Nafplio, Greek Islands\", coord: [25.80, 36.20] },\n    { name: \"Star Breeze\", type: \"motor\", mmsi: \"311083000\", region: \"South Pacific\",     loc: \"Papeete, Tahiti — Dreams of Tahiti cruise\",coord: [-149.57, -17.54] },\n    { name: \"Star Seeker\", type: \"motor\", mmsi: \"255806211\", region: \"Alaska\",            loc: \"Inside Passage, bound for Juneau\",          coord: [-133.90, 57.80] },\n  ];\n\n  const HQ = { coord: [-80.19, 25.76], label: \"Miami HQ\" };\n\n  // ── Live Weather ────────────────────────────────────────────────────────────────────\n  // Uses OpenWeatherMap free tier (1,000 calls/day).\n  // Click the cloud button to enter your free key from openweathermap.org\n  const WX_CACHE_MS = 30 * 60 * 1000;\n  let wxKey = ''; try { wxKey = localStorage.getItem('ws_wx_key') || ''; } catch(e) {}\n\n  const WX_COND = {\n    'Clear':'Sunny','Clouds':'Cloudy','Rain':'Rain','Drizzle':'Drizzle',\n    'Thunderstorm':'Storms','Snow':'Snow','Mist':'Misty','Fog':'Foggy','Haze':'Hazy'\n  };\n\n  function updateWxEl(s) {\n    if (!s.wxEl || !s.weather) return;\n    s.wxEl.innerHTML = '<strong>' + s.weather.temp + '&deg;F<\u002Fstrong><span class=\"wx-cond\">' + s.weather.cond + '<\u002Fspan>';\n  }\n\n  async function fetchShipWeather(s) {\n    const url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + s.coord[1] +\n      '&lon=' + s.coord[0] + '&appid=' + wxKey + '&units=imperial';\n    const r = await fetch(url, { signal: AbortSignal.timeout(6000) });\n    const j = await r.json();\n    if (j.main) {\n      s.weather = { temp: Math.round(j.main.temp), cond: WX_COND[j.weather[0].main] || j.weather[0].main, wind: Math.round(j.wind.speed) };\n      updateWxEl(s);\n    }\n  }\n\n  async function fetchAllWeather() {\n    if (!wxKey) return;\n    try {\n      const c = JSON.parse(localStorage.getItem('ws_wx_cache') || 'null');\n      if (c && Date.now() - c.ts < WX_CACHE_MS) {\n        c.data.forEach(d => { const s = SHIPS.find(x => x.name === d.name); if (s && d.w) { s.weather = d.w; updateWxEl(s); } });\n        return;\n      }\n    } catch(e) {}\n    await Promise.allSettled(SHIPS.map(fetchShipWeather));\n    try { localStorage.setItem('ws_wx_cache', JSON.stringify({ ts: Date.now(), data: SHIPS.map(s => ({ name: s.name, w: s.weather || null })) })); } catch(e) {}\n  }\n\n  if (wxKey) fetchAllWeather();\n\n  const wxOverlayEl  = document.getElementById('wxOverlay');\n  const wxKeyInputEl = document.getElementById('wxKeyInput');\n  document.getElementById('wxCfg').addEventListener('click', () => { wxKeyInputEl.value = wxKey; wxOverlayEl.classList.add('open'); });\n  document.getElementById('wxCancel').addEventListener('click', () => wxOverlayEl.classList.remove('open'));\n  document.getElementById('wxSave').addEventListener('click', () => {\n    wxKey = wxKeyInputEl.value.trim();\n    try { localStorage.setItem('ws_wx_key', wxKey); } catch(e) {}\n    wxOverlayEl.classList.remove('open');\n    if (wxKey) fetchAllWeather();\n  });\n  wxOverlayEl.addEventListener('click', e => { if (e.target === wxOverlayEl) wxOverlayEl.classList.remove('open'); });\n  // ────────────────────────────────────────────────────────────────────────\n\n  let focused = -1;\n\n  // ----- build labels + roster -----\n  SHIPS.forEach((s, i) => {\n    const el = document.createElement(\"div\");\n    el.className = \"ship\";\n    el.innerHTML = '<span class=\"leader\"><\u002Fspan><span class=\"name\">' + s.name + '<\u002Fspan>';\n    el.style.opacity = \"0\";\n    labelsEl.appendChild(el);\n    s.el = el;\n\n    const li = document.createElement(\"li\");\n    const pinPath = s.type === \"sail\"\n      ? \"M13 4 L13 17 L21 17 Q16 10 13 4 Z M11.4 7 L11.4 17 L5 17 Q8.3 11 11.4 7 Z M5 18 L19 18 L16.5 21 Q12 22.4 7.5 21 Z\"\n      : \"M1 19 L16 19 Q21 19 22 15 Q22 13 20 13 L1 13 Z M2 13 L2 10 L20 10 L20 13 Z M3 10 L3 8 L18 8 L18 10 Z M4 8 L4 6 L14 6 L14 8 Z M6 6 L5.5 4 L9.5 4 L9 6 Z M13 6 L13 4 M11 5 L15 5\";\n    li.innerHTML =\n      '<svg class=\"pin\" viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"' + pinPath + '\"><\u002Fpath><\u002Fsvg>' +\n      '<span class=\"meta\"><span class=\"nm\">' + s.name + '<\u002Fspan>' +\n      '<span class=\"loc\">' + s.loc + '<\u002Fspan>' +\n      '<span class=\"wx\">—<\u002Fspan><\u002Fspan>' +\n      '<span class=\"region\">' + s.region + '<\u002Fspan>';\n    s.wxEl = li.querySelector('.wx');\n    li.addEventListener(\"click\", () => focusShip(i));\n    rosterEl.appendChild(li);\n    s.li = li;\n  });\n\n  const projection = d3.geoOrthographic().translate([cx, cy]).scale(R).clipAngle(90);\n  const path = d3.geoPath(projection, ctx);\n  const graticule = d3.geoGraticule10();\n  const sphere = { type: \"Sphere\" };\n\n  let land = null;\n  const PHI = -16;\n  let rot = [200, PHI];\n  let zoom = 1;\n  let spinning = true;\n  let lastT = null;\n  let tween = null;\n  const SPIN = 6;\n\n  function setZoom(z) { zoom = Math.max(0.75, Math.min(5, z)); render(); }\n\n  // motor yacht glyph — Star Breeze-style profile: former Seabourn Spirit class,\n  // stretched luxury yacht — long low hull, rounded clipper bow, aft funnel, multi-deck\n  function drawMotorYacht(x, y, u, a) {\n    ctx.save();\n    ctx.translate(x, y);\n    const p = new Path2D();\n\n    // ── HULL — long low body, rounded double-curve clipper bow (right), flat transom (left)\n    p.moveTo(-2.1*u,  0.55*u);                                   // stern bottom\n    p.lineTo( 1.4*u,  0.55*u);                                   // keel\n    p.quadraticCurveTo( 1.95*u, 0.55*u,  2.2*u,  0.15*u);       // bow lower sweep\n    p.quadraticCurveTo( 2.1*u, -0.1*u,   1.85*u, -0.15*u);      // bow upper curve\n    p.lineTo(-2.1*u, -0.15*u);                                   // main deck\n    p.closePath();                                                // transom\n\n    // ── LOWER SUPERSTRUCTURE — nearly full length, generous height\n    p.moveTo(-1.95*u, -0.15*u);\n    p.lineTo(-1.95*u, -0.62*u);\n    p.lineTo( 1.72*u, -0.62*u);\n    p.lineTo( 1.72*u, -0.15*u);\n    p.closePath();\n\n    // ── MID SUPERSTRUCTURE\n    p.moveTo(-1.78*u, -0.62*u);\n    p.lineTo(-1.78*u, -1.00*u);\n    p.lineTo( 1.48*u, -1.00*u);\n    p.lineTo( 1.48*u, -0.62*u);\n    p.closePath();\n\n    // ── BRIDGE DECK — narrower, slightly set back at both ends\n    p.moveTo(-1.52*u, -1.00*u);\n    p.lineTo(-1.52*u, -1.30*u);\n    p.lineTo( 1.05*u, -1.30*u);\n    p.lineTo( 1.05*u, -1.00*u);\n    p.closePath();\n\n    // ── AFT FUNNEL — aft of midships, slightly forward-raked (signature Star-class feature)\n    p.moveTo(-0.88*u, -1.30*u);\n    p.lineTo(-0.95*u, -1.64*u);\n    p.lineTo(-0.42*u, -1.64*u);\n    p.lineTo(-0.38*u, -1.30*u);\n    p.closePath();\n\n    // ── FORWARD MAST\n    p.moveTo( 0.58*u, -1.30*u);\n    p.lineTo( 0.58*u, -1.68*u);\n\n    // ── RADAR ARM\n    p.moveTo( 0.22*u, -1.52*u);\n    p.lineTo( 0.95*u, -1.52*u);\n\n    ctx.lineJoin = \"round\"; ctx.lineCap = \"round\";\n    ctx.shadowColor = \"rgba(14, 36, 54, \" + (0.42 * a) + \")\";\n    ctx.shadowBlur = 5; ctx.shadowOffsetY = 1.5;\n    ctx.strokeStyle = \"rgba(251, 249, 244, \" + (0.95 * a) + \")\";\n    ctx.lineWidth = 2.8; ctx.stroke(p);\n    ctx.shadowColor = \"transparent\"; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;\n    ctx.fillStyle = \"rgba(140, 193, 160, \" + a + \")\"; ctx.fill(p);\n    ctx.strokeStyle = \"rgba(14, 36, 54, \" + (0.50 * a) + \")\";\n    ctx.lineWidth = 0.9; ctx.stroke(p);\n    ctx.restore();\n  }\n\n  // HQ marker — small navy circle with seafoam W\n  function drawHQ(x, y, a) {\n    const r = 8;\n    ctx.save();\n    ctx.translate(x, y);\n    // halo\n    ctx.shadowColor = \"rgba(14, 36, 54, \" + (0.35 * a) + \")\";\n    ctx.shadowBlur = 6;\n    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);\n    ctx.fillStyle = \"rgba(31, 77, 107, \" + (0.92 * a) + \")\"; ctx.fill();\n    ctx.shadowColor = \"transparent\"; ctx.shadowBlur = 0;\n    ctx.strokeStyle = \"rgba(156, 194, 210, \" + (0.85 * a) + \")\";\n    ctx.lineWidth = 1.4; ctx.stroke();\n    // W glyph\n    ctx.font = \"bold \" + (r * 1.35) + \"px 'Cormorant Garamond', Georgia, serif\";\n    ctx.fillStyle = \"rgba(156, 194, 210, \" + a + \")\";\n    ctx.textAlign = \"center\"; ctx.textBaseline = \"middle\";\n    ctx.fillText(\"W\", 0, 0.5);\n    ctx.restore();\n  }\n\n  // small light-green sail glyph, centred on (x,y) — with paper halo + crisp edge so it pops\n  function drawSail(x, y, u, a) {\n    ctx.save();\n    ctx.translate(x, y);\n    const p = new Path2D();\n    // mainsail (right of mast)\n    p.moveTo(0, -1.7 * u); p.lineTo(0, 0.5 * u); p.lineTo(1.05 * u, 0.5 * u);\n    p.quadraticCurveTo(0.5 * u, -0.45 * u, 0, -1.7 * u); p.closePath();\n    // jib (left of mast)\n    p.moveTo(-0.1 * u, -1.15 * u); p.lineTo(-0.1 * u, 0.5 * u); p.lineTo(-0.78 * u, 0.5 * u);\n    p.quadraticCurveTo(-0.42 * u, -0.4 * u, -0.1 * u, -1.15 * u); p.closePath();\n    // hull\n    p.moveTo(-1.15 * u, 0.62 * u); p.lineTo(1.15 * u, 0.62 * u);\n    p.quadraticCurveTo(0.55 * u, 1.42 * u, 0, 1.42 * u);\n    p.quadraticCurveTo(-0.55 * u, 1.42 * u, -1.15 * u, 0.62 * u); p.closePath();\n\n    ctx.lineJoin = \"round\"; ctx.lineCap = \"round\";\n    // paper halo (with a soft shadow for lift) so the sail reads on ocean AND land\n    ctx.shadowColor = \"rgba(14, 36, 54, \" + (0.40 * a) + \")\";\n    ctx.shadowBlur = 4; ctx.shadowOffsetY = 1.5;\n    ctx.strokeStyle = \"rgba(251, 249, 244, \" + (0.95 * a) + \")\";\n    ctx.lineWidth = 2.8; ctx.stroke(p);\n    ctx.shadowColor = \"transparent\"; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;\n    // green fill\n    ctx.fillStyle = \"rgba(140, 193, 160, \" + a + \")\"; ctx.fill(p);\n    // crisp edge\n    ctx.strokeStyle = \"rgba(14, 36, 54, \" + (0.50 * a) + \")\";\n    ctx.lineWidth = 0.9; ctx.stroke(p);\n    ctx.restore();\n  }\n\n  function render() {\n   try {\n    projection.scale(R * zoom).rotate(rot);\n    ctx.clearRect(0, 0, SIZE, SIZE);\n\n    const er = R * zoom;\n    // ocean sphere — lit-from-top-left marble, with a soft drop shadow to lift it\n    ctx.save();\n    ctx.shadowColor = \"rgba(14, 36, 54, 0.28)\";\n    ctx.shadowBlur = 30; ctx.shadowOffsetY = 14;\n    const og = ctx.createRadialGradient(cx - er * 0.32, cy - er * 0.38, er * 0.12, cx, cy, er * 1.08);\n    og.addColorStop(0, \"#2C6585\");\n    og.addColorStop(0.55, \"#1F4D6B\");\n    og.addColorStop(1, \"#11324A\");\n    ctx.beginPath(); path(sphere); ctx.fillStyle = og; ctx.fill();\n    ctx.restore();\n\n    // graticule — faint light\n    ctx.beginPath(); path(graticule);\n    ctx.lineWidth = 0.5; ctx.strokeStyle = \"rgba(197, 218, 227, 0.16)\"; ctx.stroke();\n\n    // land — pale seafoam fill, soft light outline\n    if (land) {\n      ctx.beginPath(); path(land);\n      ctx.fillStyle = \"rgba(212, 227, 233, 0.92)\"; ctx.fill();\n      ctx.lineWidth = 0.7; ctx.strokeStyle = \"rgba(251, 249, 244, 0.55)\"; ctx.stroke();\n    }\n\n    // rim — seafoam glow\n    ctx.beginPath(); path(sphere);\n    ctx.lineWidth = 1.3; ctx.strokeStyle = \"rgba(156, 194, 210, 0.65)\"; ctx.stroke();\n\n    const center = [-rot[0], -rot[1]];\n    const now = performance.now();\n    SHIPS.forEach((s, i) => {\n      const dist = d3.geoDistance(s.coord, center);\n      const front = dist < Math.PI / 2;\n      const p = projection(s.coord);\n      const k = Math.cos(dist);\n      const vis = front ? Math.max(0, Math.min(1, (k - 0.04) / 0.22)) : 0;\n\n      if (front && p && vis > 0.01) {\n        if (i === focused) {\n          const pr = (Math.sin(now / 380) + 1) / 2; // 0..1 pulse\n          ctx.beginPath();\n          ctx.arc(p[0], p[1], 12 + pr * 5, 0, Math.PI * 2);\n          ctx.strokeStyle = \"rgba(140, 193, 160, \" + (0.32 * vis * (1 - pr)) + \")\";\n          ctx.lineWidth = 1.4; ctx.stroke();\n        }\n        if (s.type === \"sail\") drawSail(p[0], p[1], i === focused ? 7.4 : 6.4, vis);\n        else drawMotorYacht(p[0], p[1], i === focused ? 7.4 : 6.4, vis);\n\n        let dx = p[0] - cx, dy = p[1] - cy;\n        const len = Math.hypot(dx, dy) || 1; dx /= len; dy /= len;\n        const off = R * zoom + 16;\n        const lx = cx + dx * off, ly = cy + dy * off;\n        const onLeft = lx < cx;\n        s.el.classList.toggle(\"left\", onLeft);\n        s.el.style.opacity = vis.toFixed(3);\n        s.el.style.transform = \"translate(\" + lx + \"px,\" + ly + \"px) translate(\" + (onLeft ? \"-100%\" : \"0\") + \", -50%)\";\n        s.el.style.zIndex = Math.round(vis * 100);\n        s._p = p;\n      } else {\n        s.el.style.opacity = \"0\";\n        s._p = null;\n      }\n    });\n\n    // Miami HQ marker\n    const hqDist = d3.geoDistance(HQ.coord, center);\n    if (hqDist < Math.PI / 2) {\n      const hqP = projection(HQ.coord);\n      const hqK = Math.cos(hqDist);\n      const hqVis = Math.max(0, Math.min(1, (hqK - 0.04) / 0.22));\n      if (hqP && hqVis > 0.01) drawHQ(hqP[0], hqP[1], hqVis);\n    }\n   } catch (e) { console.error(\"render error\", e); }\n  }\n\n  function frame(t) {\n    if (lastT === null) lastT = t;\n    const dt = Math.min(120, t - lastT); lastT = t;\n    if (tween) {\n      const p = Math.min(1, (t - tween.t0) / tween.dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      rot[0] = tween.fromLon + tween.dLon * e;\n      rot[1] = tween.fromLat + (tween.toLat - tween.fromLat) * e;\n      if (p >= 1) tween = null;\n    } else if (spinning) {\n      rot[0] = (rot[0] + SPIN * dt / 1000) % 360;\n    }\n    render();\n    requestAnimationFrame(frame);\n  }\n\n  function setActive(i) {\n    SHIPS.forEach((s, j) => s.li.classList.toggle(\"active\", i === j));\n  }\n\n  function focusShip(i) {\n    const s = SHIPS[i];\n    focused = i; spinning = false; setActive(i);\n    const targetLon = -s.coord[0];\n    let dLon = ((targetLon - rot[0] + 540) % 360) - 180;\n    tween = { fromLon: rot[0], dLon: dLon, fromLat: rot[1], toLat: -s.coord[1], t0: performance.now(), dur: 950 };\n    zoom = Math.max(zoom, 1.55);\n  }\n\n  function resume() {\n    focused = -1; tween = null; spinning = true; setActive(-1); setZoom(1); rot[1] = PHI;\n  }\n\n  render();\n  requestAnimationFrame(frame);\n\n  // ----- Daily Dispatch -----\n  const FACTS = [\n    { fact: \"Wind Surf is the largest sailing yacht in the Windstar fleet — stretching 617 feet and carrying just 312 guests, with more sail area than any cruise ship afloat.\", attr: \"Wind Surf\" },\n    { fact: \"Wind Star was the original Windstar ship, launched in 1986. She pioneered the idea that luxury at sea could mean sails, not black-tie dinners.\", attr: \"Wind Star\" },\n    { fact: \"Wind Spirit carries just 148 guests, with a staff-to-guest ratio that rivals the finest boutique hotels on land.\", attr: \"Wind Spirit\" },\n    { fact: \"Star Breeze was transformed under Windstar's \\u2018Star Plus Initiative\\u2019 — a $250 million fleet-wide renovation that stretched each motor yacht by 84 feet and added an entirely new deck.\", attr: \"Star Breeze\" },\n    { fact: \"Star Pride\\u2019s hull is ice-strengthened, allowing her to venture into waters most luxury ships never reach — from Norwegian fjords to Iceland\\u2019s remote coves.\", attr: \"Star Pride\" },\n    { fact: \"Star Legend carries a watersports marina platform that lowers from her stern, putting snorkels, kayaks, and paddleboards directly at the waterline.\", attr: \"Star Legend\" },\n    { fact: \"Star Seeker is Windstar\\u2019s newest vessel, joining the fleet in 2025 and already charting Alaska\\u2019s Inside Passage — one of the most dramatic stretches of coastline on earth.\", attr: \"Star Seeker\" },\n    { fact: \"Tarragona\\u2019s Roman amphitheatre, built in the 2nd century AD, once looked directly out to sea — audiences watched gladiators with the Mediterranean as their backdrop.\", attr: \"Tarragona, Spain\" },\n    { fact: \"Piraeus has been Athens\\u2019 port since antiquity. The ancient fleet that defeated the Persian armada at Salamis sailed from these very waters in 480 BC.\", attr: \"Piraeus, Greece\" },\n    { fact: \"The Port of Leith has welcomed ships to Edinburgh since the 14th century. Mary Queen of Scots landed here in 1561, returning from France to claim her throne.\", attr: \"Leith, Scotland\" },\n    { fact: \"Nafplio was the first capital of modern Greece after independence in 1821 — a city layered with Venetian fortresses, Ottoman fountains, and neoclassical squares.\", attr: \"Nafplio, Greece\" },\n    { fact: \"Papeete means \\u2018basket of water\\u2019 in Tahitian. When trade winds blow through the harbor, the scent of tiare flowers drifts across the anchorage before the ship is even in sight.\", attr: \"Papeete, Tahiti\" },\n    { fact: \"Alaska\\u2019s Inside Passage was carved by glaciers over 10,000 years. Its protected waters allow small ships to reach villages and fjords completely inaccessible to larger vessels.\", attr: \"Inside Passage, Alaska\" },\n    { fact: \"Windstar is the Official Cruise Line of the James Beard Foundation — each voyage features chefs and menus inspired by the culinary traditions of the destinations visited.\", attr: \"Windstar Cruises\" },\n    { fact: \"The Windstar fleet\\u2019s sails are computer-controlled, responding automatically to wind and weather. At full sail, the engines throttle back — the only sound is the sea.\", attr: \"The Fleet\" },\n    { fact: \"On any given Windstar voyage, guests may find their ship anchored overnight in a harbor too small for any other cruise line — the marina platform open, stars overhead.\", attr: \"180\\u00b0 from Ordinary\" },\n    { fact: \"Windstar\\u2019s Open Bridge policy invites guests to visit the navigation deck, speak with the captain, and watch the charts — an intimacy no mega-ship can offer.\", attr: \"Open Bridge\" },\n    { fact: \"The Aegean has been a crossroads of civilizations for four millennia. Sailing between its islands, you pass within sight of Minoan, Greek, Roman, Byzantine, and Ottoman history in a single afternoon.\", attr: \"Aegean Sea\" },\n    { fact: \"Scotland\\u2019s Firth of Clyde was once the launching ground of the world\\u2019s great ocean liners. Today its waters are quieter, the hills unchanged, the light still extraordinary.\", attr: \"Gourock, Scotland\" },\n    { fact: \"Bora Bora\\u2019s lagoon is so distinctly turquoise that astronauts report being able to identify it from orbit by color alone.\", attr: \"French Polynesia\" },\n    { fact: \"At sea level, the horizon is roughly 3 miles away. From the bridge of a Windstar yacht, with the masts overhead and nothing between you and the curve of the earth, it feels infinite.\", attr: \"At Sea\" },\n  ];\n\n  (function initDispatch() {\n    const dayIndex = Math.floor(Date.now() / 86400000); // changes daily\n    const today = FACTS[dayIndex % FACTS.length];\n    document.getElementById('dispatchFact').textContent = today.fact;\n    document.getElementById('dispatchAttr').textContent = today.attr;\n  })();\n\n  // ----- world data: cache to localStorage so it loads offline after first visit -----\n  function applyWorld(world) { land = topojson.feature(world, world.objects.countries); render(); }\n  try {\n    const cached = localStorage.getItem(\"ws_world_110m\");\n    if (cached) applyWorld(JSON.parse(cached));\n  } catch (e) {}\n  if (!land) {\n    var worldUrl = (window.__resources && window.__resources.worldData) || \"https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json\";\n    fetch(worldUrl)\n      .then(r => r.json())\n      .then(world => { applyWorld(world); try { localStorage.setItem(\"ws_world_110m\", JSON.stringify(world)); } catch (e) {} })\n      .catch(e => console.error(\"land load failed\", e));\n  }\n\n  // ----- interaction -----\n  const pointers = new Map();\n  let dragLast = null, pinchStart = null, downAt = null, moved = 0;\n\n  function rotateBy(dx, dy) {\n    const k = 0.34 / Math.sqrt(zoom);\n    rot[0] = (rot[0] + dx * k) % 360;\n    rot[1] = Math.max(-90, Math.min(90, rot[1] - dy * k));\n  }\n\n  loaderEl.addEventListener(\"pointerdown\", (e) => {\n    loaderEl.setPointerCapture(e.pointerId);\n    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });\n    downAt = { x: e.clientX, y: e.clientY }; moved = 0;\n    spinning = false; tween = null;\n    loaderEl.classList.add(\"dragging\");\n    if (pointers.size === 1) dragLast = { x: e.clientX, y: e.clientY };\n    else if (pointers.size === 2) {\n      const p = [...pointers.values()];\n      pinchStart = { dist: Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y), zoom: zoom };\n      dragLast = null;\n    }\n  });\n\n  loaderEl.addEventListener(\"pointermove\", (e) => {\n    if (!pointers.has(e.pointerId)) return;\n    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });\n    if (pointers.size >= 2 && pinchStart) {\n      const p = [...pointers.values()];\n      const d = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);\n      setZoom(pinchStart.zoom * (d / pinchStart.dist));\n    } else if (dragLast) {\n      const ddx = e.clientX - dragLast.x, ddy = e.clientY - dragLast.y;\n      moved += Math.abs(ddx) + Math.abs(ddy);\n      rotateBy(ddx, ddy);\n      dragLast = { x: e.clientX, y: e.clientY };\n      render();\n    }\n  });\n\n  function hitTest(e) {\n    const rect = canvas.getBoundingClientRect();\n    const sx = (e.clientX - rect.left) * (SIZE / rect.width);\n    const sy = (e.clientY - rect.top) * (SIZE / rect.height);\n    let best = -1, bestD = 16;\n    SHIPS.forEach((s, i) => {\n      if (!s._p) return;\n      const d = Math.hypot(s._p[0] - sx, s._p[1] - sy);\n      if (d < bestD) { bestD = d; best = i; }\n    });\n    return best;\n  }\n\n  function endPointer(e) {\n    const wasClick = downAt && moved < 6 && pointers.size === 1;\n    pointers.delete(e.pointerId);\n    if (pointers.size < 2) pinchStart = null;\n    if (pointers.size === 1) { const p = [...pointers.values()][0]; dragLast = { x: p.x, y: p.y }; }\n    if (pointers.size === 0) {\n      dragLast = null; loaderEl.classList.remove(\"dragging\");\n      if (wasClick) {\n        const hit = hitTest(e);\n        if (hit >= 0) { focusShip(hit); return; }\n      }\n      if (focused < 0) spinning = true;\n    }\n  }\n  loaderEl.addEventListener(\"pointerup\", endPointer);\n  loaderEl.addEventListener(\"pointercancel\", endPointer);\n\n  loaderEl.addEventListener(\"wheel\", (e) => {\n    e.preventDefault();\n    setZoom(zoom * (e.deltaY < 0 ? 1.12 : 1 / 1.12));\n  }, { passive: false });\n\n  document.getElementById(\"zin\").addEventListener(\"click\", () => setZoom(zoom * 1.25));\n  document.getElementById(\"zout\").addEventListener(\"click\", () => setZoom(zoom / 1.25));\n  document.getElementById(\"zreset\").addEventListener(\"click\", resume);\n})();\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
